<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AĞALAR VİP">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <title>AĞALAR VİP • MCT YAZILIM</title>
  <style>
    :root {
      --gold: #d4a843;
      --gold-light: #f0d68a;
      --gold-dark: #8b6914;
      --bg: #0a0a08;
      --card: #141410;
      --border: #3d3218;
      --text: #e8dcc8;
      --online: #3ea34b;
      --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: #050505;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      background: radial-gradient(circle at 20% 10%, #1a1405 0%, #030303 90%);
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      background: rgba(18,16,10,0.9);
      border: 1.5px solid rgba(180,150,40,0.3);
      border-radius: 2rem;
      box-shadow: 0 30px 50px rgba(0,0,0,0.8);
      padding: 1.5rem 1rem;
      color: var(--text);
    }

    /* GİRİŞ */
    .login-screen { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .logo-icon { font-size: 3.5rem; filter: drop-shadow(0 0 15px rgba(200,150,40,0.5)); margin-bottom: 0.2rem; }
    .vip-title {
      font-size: 2.5rem; font-weight: 900; letter-spacing: 4px;
      background: linear-gradient(180deg, #f9e076, #b68b28);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1.1;
    }
    .subtitle {
      font-size: 0.9rem; color: #ccb15e; letter-spacing: 2px; margin: 1rem 0 1.5rem;
      padding: 0.4rem 1.2rem; border-top: 1px dashed rgba(180,148,60,0.5);
      border-bottom: 1px dashed rgba(180,148,60,0.5);
    }
    .input-group { width: 100%; margin: 0.6rem 0; }
    .input-group label { display: block; font-size: 0.8rem; color: var(--gold-light); margin-bottom: 0.3rem; letter-spacing: 1px; }
    .input-field {
      width: 100%; background: rgba(10,10,8,0.9); border: 2px solid var(--gold-dark);
      border-radius: 2.5rem; padding: 0.8rem 1.2rem; font-size: 1rem;
      color: #f7eaca; text-align: center; outline: none; font-weight: 500;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); transition: 0.2s;
    }
    .input-field:focus { border-color: var(--gold-light); }
    .btn {
      background: linear-gradient(180deg, #e0b84c, #8a6c20);
      border: none; color: #111; font-weight: 800; font-size: 1rem; letter-spacing: 2px;
      padding: 0.7rem 2rem; border-radius: 2.5rem; cursor: pointer; text-transform: uppercase;
      box-shadow: 0 8px 15px rgba(0,0,0,0.6); width: 100%; max-width: 240px; margin: 0.5rem 0;
      transition: 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-small {
      padding: 0.4rem 0.9rem; font-size: 0.7rem; letter-spacing: 1px;
      background: var(--gold-dark); color: #000; border: none; border-radius: 1.5rem;
      font-weight: 700; cursor: pointer; margin: 0.2rem;
    }
    .message-box { margin-top: 0.8rem; font-weight: 700; font-size: 0.9rem; min-height: 1.2rem; }
    .msg-error { color: #ff5e5e; }
    .msg-blocked { color: #ffa726; }

    /* DASHBOARD */
    .dashboard { display: none; flex-direction: column; gap: 0.8rem; }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between; gap: 0.4rem;
      background: rgba(10,10,8,0.8); border-radius: 2.5rem; padding: 0.4rem 0.8rem;
      border: 1px solid rgba(180,148,60,0.3); flex-wrap: wrap;
    }
    .avatar-circle {
      width: 40px; height: 40px; min-width: 40px; border-radius: 50%;
      border: 2px solid var(--gold); box-shadow: 0 0 10px rgba(200,160,50,0.4);
      background-size: cover; background-position: center; background-color: #1e1a0e;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; font-weight: 800; color: var(--gold-light); text-transform: uppercase;
    }
    .user-name-display { font-weight: 800; font-size: 0.85rem; color: #f5e2a9; }
    .user-special { font-size: 0.65rem; color: #e6c468; }

    .radio-panel {
      background: #0e0c07; border: 2px solid #3a2e14; border-radius: 1.5rem;
      padding: 0.8rem; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }
    .channel-tabs { display: flex; flex-wrap: wrap; gap: 0.3rem; margin: 0.4rem 0 0.6rem; }
    .channel-btn {
      background: #1a160a; border: 1px solid #4a3a18; color: #aa8e3c;
      padding: 0.3rem 0.7rem; border-radius: 1.2rem; font-size: 0.7rem; font-weight: 700;
      cursor: pointer; transition: 0.1s;
    }
    .channel-btn.active { background: var(--gold); color: #000; border-color: #f0d68a; box-shadow: 0 0 10px rgba(200,160,50,0.5); }
    .channel-btn.locked { opacity: 0.4; pointer-events: none; text-decoration: line-through; }

    .messages-box {
      background: #050403; border: 1px solid #2e2612; border-radius: 1rem;
      padding: 0.5rem; height: 180px; overflow-y: auto; margin-bottom: 0.5rem;
      font-family: 'Courier New', monospace; font-size: 0.8rem;
      -webkit-overflow-scrolling: touch;
    }
    .msg-row {
      display: flex; flex-wrap: wrap; align-items: center; gap: 0.2rem 0.4rem;
      padding: 0.3rem 0.5rem; margin: 0.2rem 0; background: rgba(180,148,60,0.05);
      border-radius: 0.6rem; border-left: 3px solid var(--gold-dark);
    }
    .msg-sender { font-weight: 700; color: var(--gold-light); font-size: 0.75rem; }
    .msg-content { color: #ccc; flex: 1; word-break: break-word; font-size: 0.8rem; }
    .msg-time { font-size: 0.6rem; color: #6b5c3a; margin-left: auto; }
    .msg-delete { background: none; border: none; color: #8a6a3a; cursor: pointer; padding: 0 0.2rem; }
    .voice-play-btn { background: var(--gold-dark); border: none; color: #000; font-weight: bold; border-radius: 0.8rem; padding: 0.1rem 0.5rem; font-size: 0.65rem; margin-left: 0.2rem; }

    .msg-input-row { display: flex; gap: 0.3rem; align-items: center; }
    .msg-input {
      flex: 1; background: #0d0c08; border: 1.5px solid #4a3a18; border-radius: 2rem;
      padding: 0.5rem 0.9rem; color: #f0e6c5; outline: none; font-size: 0.8rem;
    }
    .send-btn { background: var(--gold); border: none; color: #000; font-weight: 800; border-radius: 2rem; padding: 0.5rem 0.9rem; cursor: pointer; }
    .ptt-btn {
      background: #2a1f0a; border: 2px solid #b4943c; color: var(--gold-light);
      font-size: 1.4rem; width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .ptt-btn.recording { background: #c44242; border-color: #ff5e5e; color: white; }

    .agalar-card { background: rgba(14,12,6,0.8); border: 1px solid var(--border); border-radius: 1.2rem; padding: 0.6rem; }
    .agalar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
    .gorev-card { background: rgba(14,12,6,0.8); border: 1px solid var(--border); border-radius: 1.2rem; padding: 0.6rem; text-align: center; }

    .footer { text-align: center; font-size: 0.7rem; color: var(--gold-light); letter-spacing: 1px; margin-top: 0.3rem; }

    @media (max-width: 380px) {
      .agalar-grid { grid-template-columns: 1fr; }
      .vip-title { font-size: 2rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="app-container" id="appContainer">
    <!-- GİRİŞ -->
    <div id="loginScreen" class="login-screen">
      <div class="logo-icon">🌙⭐</div>
      <div class="vip-title">AĞALAR VİP</div>
      <div class="subtitle">✦ SALON BAŞLATILIYOR ✦</div>
      <div class="input-group">
        <label>🔑 KULLANICI ADI</label>
        <input type="text" id="usernameInput" class="input-field" placeholder="İsminizi yazın..." autocomplete="off" inputmode="text">
      </div>
      <div class="input-group">
        <label>🔐 ŞİFRE</label>
        <input type="password" id="passwordInput" class="input-field" placeholder="••••••" autocomplete="off">
      </div>
      <button class="btn" id="loginBtn">GİRİŞ YAP</button>
      <div id="messageBox" class="message-box"></div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardScreen" class="dashboard">
      <div class="top-bar">
        <div style="display:flex;align-items:center;gap:0.4rem;flex:1;">
          <div class="avatar-circle" id="userAvatar">A</div>
          <div>
            <div class="user-name-display" id="displayName"></div>
            <div class="user-special" id="displaySpecial"></div>
          </div>
        </div>
        <button id="changePassBtn" class="btn-small">🔐 Şifre</button>
        <button id="viewPasswordsBtn" class="btn-small" style="display:none;">👁️</button>
        <button id="logoutBtn" class="btn-small">ÇIKIŞ</button>
      </div>

      <div class="radio-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-weight:800;color:#e6c468;">📻 TELSİZ</span>
          <span id="freqDisplay" style="background:#000;padding:0.2rem 0.6rem;border-radius:1rem;font-family:monospace;color:var(--gold);">145.600</span>
        </div>
        <div class="channel-tabs" id="channelTabs">
          <button class="channel-btn active" data-channel="ana">🔊 ANA</button>
          <button class="channel-btn" data-channel="kacak">📦 KAÇAK</button>
          <button class="channel-btn" data-channel="pazar">💎 PAZAR</button>
          <button class="channel-btn" data-channel="eskort">🚛 ESKORT</button>
          <button class="channel-btn" data-channel="ozel">🔐 ÖZEL</button>
        </div>
        <div class="messages-box" id="messagesBox"></div>
        <div class="msg-input-row">
          <input type="text" class="msg-input" id="msgInput" placeholder="Mesaj yaz...">
          <button class="send-btn" id="sendMsgBtn">GÖNDER</button>
          <button class="ptt-btn" id="pttBtn" title="Bas‑Konuş">🎤</button>
        </div>
      </div>

      <div class="agalar-card">
        <div style="font-weight:800;color:var(--gold-light);margin-bottom:0.4rem;">🐺 AĞALAR</div>
        <div class="agalar-grid" id="agalarGrid"></div>
      </div>
      <div class="gorev-card">
        <div style="font-size:0.65rem;color:#8a7a4a;">📋 AKTİF GÖREV</div>
        <div style="font-weight:800;color:#f0d68a;" id="gorevText"></div>
      </div>
      <div class="footer">MCT YAZILIM</div>
    </div>
  </div>

  <script>
    (() => {
      // Kullanıcı verileri (sabit)
      const defaultPasswords = {
        "AHMET GÜL": "kacak123",
        "ADNAN MENGEŞ": "pazar456",
        "HALİL İBRAHİM KURT": "eskort789",
        "MEHMET CİHAN TÜRKAN": "patron000"
      };
      const users = [
        { name: "AHMET GÜL", unvan: "KAÇAKÇILIK", gorev: "📦 YURTDIŞINDAN KAÇAK MAL GETİREN EFSANE", special: "BÖLGENİN EN BÜYÜK KAÇAKÇISI", avatarLetter: "A", photoFile: "ahmet_gul.jpg", channels: ["ana", "kacak"] },
        { name: "ADNAN MENGEŞ", unvan: "PAZARLAMACI", gorev: "💎 ELİT KARI KIZ PAZARLAMA İMPARATORU", special: "PAZARLAMA DEHASI", avatarLetter: "A", photoFile: "adnan_menges.jpg", channels: ["ana", "pazar"] },
        { name: "HALİL İBRAHİM KURT", unvan: "ESKORT", gorev: "🛡️ GÖLGE GİBİ HER TÜRLÜ MAL VE İNSAN TAŞIYICI", special: "YOLUN KRALI", avatarLetter: "H", photoFile: "halil_ibrahim_kurt.jpg", channels: ["ana", "eskort"] },
        { name: "MEHMET CİHAN TÜRKAN", unvan: "PATRON", gorev: "👑 TÜM AĞIN VE SİSTEMİN YÜCE YÖNETİCİSİ", special: "BÜYÜK PATRON", avatarLetter: "M", photoFile: "mehmet_cihan_turkan.jpg", channels: ["ana","kacak","pazar","eskort","ozel"] }
      ];
      const channelFreqs = { ana: "145.600", kacak: "146.200", pazar: "147.800", eskort: "148.500", ozel: "149.900" };

      // State
      let currentUser = null, currentChannel = "ana";
      const STORAGE_KEY = "agalar_msg_v8", PASS_STORAGE = "agalar_pass_v3";
      let mediaRecorder, audioChunks;

      // Yardımcılar
      const $ = id => document.getElementById(id);
      const getPasswords = () => { try { return JSON.parse(localStorage.getItem(PASS_STORAGE)) || { ...defaultPasswords }; } catch { return { ...defaultPasswords }; } };
      const savePasswords = p => localStorage.setItem(PASS_STORAGE, JSON.stringify(p));
      const getUserPassword = name => getPasswords()[name] || defaultPasswords[name] || "";
      const getMessages = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } };
      const saveMessages = m => localStorage.setItem(STORAGE_KEY, JSON.stringify(m));
      const getChannelMsgs = ch => getMessages()[ch] || [];
      const addMessage = (ch, sender, text, voice=null) => {
        const all = getMessages();
        if (!all[ch]) all[ch] = [];
        all[ch].push({ id: Date.now(), sender, text, voice, time: new Date().toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit'}) });
        if (all[ch].length > 60) all[ch] = all[ch].slice(-60);
        saveMessages(all);
      };
      const deleteMessage = (ch, id) => {
        const all = getMessages();
        if (all[ch]) all[ch] = all[ch].filter(m => m.id !== id);
        saveMessages(all);
      };

      // DOM referansları
      const loginScreen = $('loginScreen'), dashboardScreen = $('dashboardScreen');
      const usernameInput = $('usernameInput'), passwordInput = $('passwordInput'), loginBtn = $('loginBtn');
      const messageBox = $('messageBox'), logoutBtn = $('logoutBtn'), changePassBtn = $('changePassBtn');
      const viewPasswordsBtn = $('viewPasswordsBtn'), userAvatar = $('userAvatar');
      const displayName = $('displayName'), displaySpecial = $('displaySpecial'), freqDisplay = $('freqDisplay');
      const messagesBox = $('messagesBox'), msgInput = $('msgInput'), sendMsgBtn = $('sendMsgBtn'), pttBtn = $('pttBtn');
      const channelTabs = $('channelTabs'), agalarGrid = $('agalarGrid'), gorevText = $('gorevText');

      // Render fonksiyonları
      const renderMessages = () => {
        const msgs = getChannelMsgs(currentChannel);
        messagesBox.innerHTML = msgs.length ? msgs.map(m => {
          const canDelete = currentUser && (currentUser.name === m.sender || currentUser.name === "MEHMET CİHAN TÜRKAN");
          const delBtn = canDelete ? `<button class="msg-delete" data-id="${m.id}">🗑️</button>` : '';
          if (m.voice) {
            return `<div class="msg-row"><span class="msg-sender">${m.sender}</span> 🎤 <button class="voice-play-btn" data-voice="${m.voice}">▶ Dinle</button>${delBtn}<span class="msg-time">${m.time}</span></div>`;
          }
          return `<div class="msg-row"><span class="msg-sender">${m.sender}</span> <span class="msg-content">${m.text}</span>${delBtn}<span class="msg-time">${m.time}</span></div>`;
        }).join('') : '<div style="color:#4a3a18;text-align:center;">--- KANAL SESSİZ ---</div>';
        messagesBox.scrollTop = messagesBox.scrollHeight;
        document.querySelectorAll('.voice-play-btn').forEach(b => b.onclick = () => new Audio(b.dataset.voice).play().catch(()=>{}));
        document.querySelectorAll('.msg-delete').forEach(b => b.onclick = () => { deleteMessage(currentChannel, Number(b.dataset.id)); renderMessages(); });
      };

      const updateChannels = () => {
        document.querySelectorAll('.channel-btn').forEach(b => {
          const ch = b.dataset.channel;
          if (currentUser.channels.includes(ch)) { b.classList.remove('locked'); b.style.pointerEvents = 'auto'; b.style.textDecoration = 'none'; }
          else { b.classList.add('locked'); b.style.pointerEvents = 'none'; b.style.textDecoration = 'line-through'; }
        });
      };

      const switchChannel = ch => {
        if (!currentUser.channels.includes(ch)) return;
        currentChannel = ch;
        freqDisplay.textContent = channelFreqs[ch] + " MHz";
        document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.channel-btn[data-channel="${ch}"]`)?.classList.add('active');
        renderMessages();
      };

      const loadAvatar = (user, el) => {
        el.style.backgroundImage = ''; el.textContent = user.avatarLetter;
        const img = new Image();
        img.onload = () => { el.style.backgroundImage = `url('fotolar/${user.photoFile}')`; el.textContent = ''; };
        img.onerror = () => { el.style.backgroundImage = 'none'; el.textContent = user.avatarLetter; };
        img.src = `fotolar/${user.photoFile}`;
      };

      const renderDashboard = () => {
        if (!currentUser) return;
        loadAvatar(currentUser, userAvatar);
        displayName.textContent = currentUser.name;
        displaySpecial.textContent = currentUser.special;
        gorevText.textContent = currentUser.gorev;
        updateChannels();
        agalarGrid.innerHTML = users.map(u => `
          <div style="display:flex;align-items:center;gap:0.3rem;background:rgba(0,0,0,0.4);border-radius:1rem;padding:0.3rem 0.5rem;">
            <span style="width:8px;height:8px;border-radius:50%;background:${currentUser && u.name===currentUser.name?'var(--online)':'#666'};${currentUser && u.name===currentUser.name?'box-shadow:0 0 6px var(--online)':''}"></span>
            <span style="font-weight:700;font-size:0.7rem;color:#ddd;">${u.name}</span>
          </div>`).join('');
        viewPasswordsBtn.style.display = currentUser.name === "MEHMET CİHAN TÜRKAN" ? 'inline-block' : 'none';
        renderMessages();
      };

      // Ses kaydı (hafif)
      const startRecording = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];
          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onloadend = () => { addMessage(currentChannel, currentUser.name, '', reader.result); renderMessages(); };
            reader.readAsDataURL(blob);
            stream.getTracks().forEach(t => t.stop());
          };
          mediaRecorder.start();
          pttBtn.classList.add('recording');
        } catch { alert('Mikrofon izni gerekli!'); }
      };
      const stopRecording = () => {
        if (mediaRecorder && mediaRecorder.state === 'recording') { mediaRecorder.stop(); pttBtn.classList.remove('recording'); }
      };

      // Eventler
      pttBtn.addEventListener('pointerdown', startRecording);
      pttBtn.addEventListener('pointerup', stopRecording);
      pttBtn.addEventListener('pointerleave', stopRecording);

      // Giriş
      loginBtn.onclick = () => {
        const name = usernameInput.value.trim(), pass = passwordInput.value.trim();
        if (!name || !pass) return (messageBox.textContent = 'İsim ve şifre gerekli', messageBox.className = 'message-box msg-error');
        const user = users.find(u => u.name === name.toUpperCase());
        if (!user) return (messageBox.textContent = 'Kullanıcı bulunamadı', messageBox.className = 'message-box msg-blocked');
        if (getUserPassword(user.name) !== pass) return (messageBox.textContent = 'Şifre yanlış', messageBox.className = 'message-box msg-blocked');
        currentUser = user;
        loginScreen.style.display = 'none'; dashboardScreen.style.display = 'flex';
        usernameInput.value = passwordInput.value = ''; messageBox.textContent = '';
        currentChannel = 'ana'; renderDashboard(); switchChannel('ana');
        addMessage('ana', '📢 SİSTEM', `${user.name} aramıza katıldı.`);
        renderMessages();
        // Titreşim (mobilde)
        if (window.navigator.vibrate) window.navigator.vibrate(100);
      };
      usernameInput.addEventListener('keydown', e => { if (e.key==='Enter') passwordInput.focus(); });
      passwordInput.addEventListener('keydown', e => { if (e.key==='Enter') loginBtn.click(); });

      logoutBtn.onclick = () => {
        if (currentUser) addMessage('ana', '📢 SİSTEM', `${currentUser.name} çıkış yaptı.`);
        currentUser = null; dashboardScreen.style.display = 'none'; loginScreen.style.display = 'flex';
      };

      channelTabs.onclick = e => {
        const btn = e.target.closest('.channel-btn');
        if (btn && !btn.classList.contains('locked')) switchChannel(btn.dataset.channel);
      };

      sendMsgBtn.onclick = () => {
        if (!currentUser) return;
        const text = msgInput.value.trim();
        if (!text) return;
        addMessage(currentChannel, currentUser.name, text);
        msgInput.value = ''; renderMessages();
      };
      msgInput.addEventListener('keydown', e => { if (e.key==='Enter') sendMsgBtn.click(); });

      // Şifre değiştir (basit prompt)
      changePassBtn.onclick = () => {
        const oldPass = prompt('Eski şifreniz:');
        if (!oldPass || oldPass !== getUserPassword(currentUser.name)) return alert('Eski şifre yanlış!');
        const newPass = prompt('Yeni şifre (en az 4 karakter):');
        if (!newPass || newPass.length < 4) return alert('Geçersiz şifre!');
        const confirmPass = prompt('Yeni şifre tekrar:');
        if (newPass !== confirmPass) return alert('Şifreler uyuşmuyor!');
        const passObj = getPasswords(); passObj[currentUser.name] = newPass; savePasswords(passObj);
        addMessage('ana', '🔒 SİSTEM', `${currentUser.name} şifresini değiştirdi.`);
        if (currentChannel === 'ana') renderMessages();
        alert('Şifre güncellendi.');
      };

      // Patron şifreleri görme
      viewPasswordsBtn.onclick = () => {
        const passwords = getPasswords();
        let list = '👁️ TÜM ŞİFRELER:\n';
        users.forEach(u => list += `${u.name}: ${passwords[u.name]}\n`);
        alert(list);
      };

      // Oturum zaman aşımı (15 dk hareketsizlik)
      let idleTimer;
      const resetIdle = () => { clearTimeout(idleTimer); if (currentUser) idleTimer = setTimeout(() => { alert('Oturum süresi doldu, çıkış yapılıyor.'); logoutBtn.click(); }, 900000); };
      document.addEventListener('click', resetIdle);
      document.addEventListener('keydown', resetIdle);
      document.addEventListener('touchstart', resetIdle);

      // Başlangıç
      window.addEventListener('load', () => {
        usernameInput.focus();
      });
    })();
  </script>
</body>
</html>
